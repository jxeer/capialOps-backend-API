{% extends "base.html" %}
{% block title %}Create Work Order - CapitalOps{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Create Work Order</h2>
    <p>Assign and track vendor work</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('vendor.create_work_order') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label>Vendor</label>
                    <select name="vendor_id" class="form-control" required>
                        <option value="">Select vendor...</option>
                        {% for v in vendors %}
                        <option value="{{ v.id }}">{{ v.name }} ({{ v.type }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Asset</label>
                    <select name="asset_id" class="form-control" required>
                        <option value="">Select asset...</option>
                        {% for a in assets %}
                        <option value="{{ a.id }}">{{ a.name }} ({{ a.location }})</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Work Type</label>
                    <select name="type" class="form-control">
                        <option value="Maintenance">Maintenance</option>
                        <option value="Repair">Repair</option>
                        <option value="Installation">Installation</option>
                        <option value="Inspection">Inspection</option>
                        <option value="Renovation">Renovation</option>
                        <option value="Emergency">Emergency</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select name="priority" class="form-control">
                        <option value="Normal">Normal</option>
                        <option value="High">High</option>
                        <option value="Urgent">Urgent</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Estimated Cost ($)</label>
                    <input type="number" name="cost" class="form-control" step="100">
                </div>
                <div class="form-group">
                    <label>Classification</label>
                    <div style="padding-top:10px;">
                        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                            <input type="checkbox" name="capex_flag">
                            <span>CapEx (Capital Expenditure)</span>
                        </label>
                    </div>
                </div>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="submit" class="btn btn-primary">Create Work Order</button>
                <a href="{{ url_for('vendor.index') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
