{% extends "base.html" %}
{% block title %}Add Investor - CapitalOps{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Add Investor</h2>
    <p>Create a new investor profile</p>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('capital.add_investor') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-row">
                <div class="form-group">
                    <label>Investor Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Accreditation Status</label>
                    <select name="accreditation_status" class="form-control">
                        <option value="Pending">Pending</option>
                        <option value="Verified">Verified</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Check Size Min ($)</label>
                    <input type="number" name="check_size_min" class="form-control" step="1000">
                </div>
                <div class="form-group">
                    <label>Check Size Max ($)</label>
                    <input type="number" name="check_size_max" class="form-control" step="1000">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Asset Preference</label>
                    <select name="asset_preference" class="form-control">
                        <option value="All">All</option>
                        <option value="Multifamily">Multifamily</option>
                        <option value="Mixed-Use">Mixed-Use</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Industrial">Industrial</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Geography Preference</label>
                    <input type="text" name="geography_preference" class="form-control">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Risk Tolerance</label>
                    <select name="risk_tolerance" class="form-control">
                        <option value="Low">Low</option>
                        <option value="Low-Medium">Low-Medium</option>
                        <option value="Medium">Medium</option>
                        <option value="Medium-High">Medium-High</option>
                        <option value="High">High</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Structure Preference</label>
                    <select name="structure_preference" class="form-control">
                        <option value="LP Equity">LP Equity</option>
                        <option value="Preferred Equity">Preferred Equity</option>
                        <option value="Debt">Debt</option>
                        <option value="Mezzanine">Mezzanine</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Timeline Preference</label>
                    <select name="timeline_preference" class="form-control">
                        <option value="1-3 years">1-3 years</option>
                        <option value="2-4 years">2-4 years</option>
                        <option value="3-5 years">3-5 years</option>
                        <option value="5-7 years">5-7 years</option>
                        <option value="7+ years">7+ years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Strategic Interest</label>
                    <select name="strategic_interest" class="form-control">
                        <option value="Value-Add">Value-Add</option>
                        <option value="Core-Plus">Core-Plus</option>
                        <option value="Opportunistic">Opportunistic</option>
                        <option value="Income">Income</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Tier Level</label>
                <select name="tier_level" class="form-control">
                    <option value="Tier 1">Tier 1 - Standard Investor</option>
                    <option value="Tier 2">Tier 2 - Priority Investor</option>
                </select>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="submit" class="btn btn-primary">Add Investor</button>
                <a href="{{ url_for('capital.investors') }}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
